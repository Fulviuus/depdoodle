name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows
            platform: windows-latest
            args: ""
            rustTarget: ""
          - name: Linux
            platform: ubuntu-22.04
            args: ""
            rustTarget: ""
          - name: macOS Apple Silicon
            platform: macos-latest
            args: "--target aarch64-apple-darwin"
            rustTarget: "aarch64-apple-darwin"
          - name: macOS Intel
            platform: macos-13
            args: "--target x86_64-apple-darwin"
            rustTarget: "x86_64-apple-darwin"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "lts/*"
          cache: npm

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust target
        if: matrix.rustTarget != ''
        run: rustup target add ${{ matrix.rustTarget }}

      - name: Cache Rust builds
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and upload release assets
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: "v__VERSION__"
          releaseName: "DepDoodle v__VERSION__"
          releaseBody: "See the assets below to download DepDoodle for Windows, macOS, and Linux. macOS builds are ad-hoc signed; if Gatekeeper blocks first launch, allow DepDoodle from System Settings > Privacy & Security."
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}
